[project]
name = "secure-aggregation-survey"
output_dir = "runs/secure-aggregation"
export_format = "xlsx" # or "csv"

# [extend]
# xlsx = "runs/v1/survey.xlsx"  # path to the screened v1 workbook

[search]
year_min = 2018
year_max = 2026
max_results_per_query = 200
sources = ["openalex", "semantic_scholar"] # Add "google_scholar" to enable Scholar (pip install surveyer[scholar]).

[[search.queries]]
label = "A_attacks"
terms = "model poisoning attacks federated learning"

[[search.queries]]
label = "B_defenses"
terms = "secure aggregation privacy federated learning"

[search.concepts]
federated = ["federated learning", "federated averaging"]
security  = ["secure aggregation", "model poisoning", "byzantine robust"]
privacy   = ["differential privacy", "privacy preserving"]

[dedup]
title_threshold = 90 # rapidfuzz token-sort ratio (0-100) for fuzzy DOI-less title merges

[filter.concepts]
federated = ["federated learning", "federated averaging"]
security  = ["secure aggregation", "model poisoning", "byzantine"]
privacy   = ["differential privacy", "privacy preserving"]

[filter.keyword]
exclude = ["survey", "review", "tutorial"]

[filter.llm]
enabled = false
provider = "openai" # or "ollama"
model = "gpt-4o-mini"
# To score locally with Ollama instead of OpenAI you need:
#   host = "http://localhost:11434"   # or a networked Ollama server on your LAN
threshold = 0.6
survey_abstract = """
We survey secure-aggregation protocols for federated learning, covering threat
models, cryptographic building blocks, and robustness to poisoning.
"""

[snowball]
enabled = true
direction = "both"
max_results_per_seed = 200
